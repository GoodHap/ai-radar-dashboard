name: Hourly AI Ecosystem Updater (Pro)

on:
  schedule:
    - cron: '0 * * * *' # 每小时运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Full Ecosystem Scraper
        run: python scraper.py

      - name: Commit and Push all data files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news.json models.json market.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: synchronize AI ecosystem data (News, Models, Market)" && git push)
