<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 行业动态观测台 (15-Day Radar)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card-bg: #ffffff; --text: #333; --border: #e9ecef; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 顶部看板 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 20px; background: var(--card-bg); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-title h1 { margin: 0 0 5px 0; font-size: 1.8rem; }
        .header-title p { margin: 0; color: #666; font-size: 0.9rem; }
        .clock-widget { text-align: right; }
        .clock-time { font-size: 1.5rem; font-weight: bold; color: #0366d6; font-variant-numeric: tabular-nums; }
        .clock-date { font-size: 0.85rem; color: #888; }

        /* 网格布局 */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .panel { background: var(--card-bg); border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .panel h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* 时间轴样式 */
        .timeline-container { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .timeline { list-style: none; padding: 0; margin: 0; }
        .timeline-item { padding: 12px 0; border-bottom: 1px dashed var(--border); }
        .timeline-meta { font-size: 0.8rem; color: #888; margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
        .tag { color: white; padding: 2px 6px; border-radius: 4px; font-weight: 500; font-size: 0.75rem; }
        .timeline-title { font-size: 0.95rem; font-weight: 600; text-decoration: none; color: var(--text); display: block; line-height: 1.4; }
        .timeline-title:hover { color: #0366d6; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h1>AI 生态雷达观测台</h1>
            <p>数据源：各大官方 RSS | 更新频率：每小时自动同步 | 观测窗口：近 15 天</p>
        </div>
        <div class="clock-widget">
            <div class="clock-time" id="sysTime">00:00:00</div>
            <div class="clock-date" id="sysDate">加载中...</div>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- 左侧：多源趋势基准对比 -->
        <div class="panel">
            <h2>📊 生态趋势对比 (每日发布量基准)</h2>
            <canvas id="trendChart" height="120"></canvas>
        </div>
        <!-- 右侧：生态总量分布 -->
        <div class="panel">
            <h2>🎯 活跃度基准分布 (总发布量比对)</h2>
            <canvas id="ecosystemChart" height="250"></canvas>
        </div>
    </div>

    <!-- 底部：聚合时间轴 -->
    <div class="panel">
        <h2>⏱️ 实时情报时间轴</h2>
        <div class="timeline-container">
            <ul class="timeline" id="timelineList">
                <li style="color:#888;">正在拉取最新数据...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // 颜色配置库
    const colors = {
        'Google AI': { bg: 'rgba(66, 133, 244, 0.2)', border: '#4285F4', tag: '#4285F4' },
        'Hugging Face': { bg: 'rgba(255, 210, 30, 0.2)', border: '#FFD21E', tag: '#E5B700' },
        'AWS Machine Learning': { bg: 'rgba(255, 153, 0, 0.2)', border: '#FF9900', tag: '#FF9900' },
        'Default': { bg: 'rgba(100, 100, 100, 0.2)', border: '#666666', tag: '#666666' }
    };

    // 初始化系统时钟
    function updateClock() {
        const now = new Date();
        document.getElementById('sysTime').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
        document.getElementById('sysDate').innerText = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 加载数据
    async function loadData() {
        try {
            const response = await fetch(`data.json?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error('Data file not ready.');
            const data = await response.json();
            
            processAndRenderCharts(data);
            renderTimeline(data);
        } catch (error) {
            document.getElementById('timelineList').innerHTML = `<li style="color:red;">获取数据失败：等待 GitHub Actions 首次运行生成 data.json (${error.message})</li>`;
        }
    }

    function generateLast15Days() {
        const dates = [];
        for (let i = 14; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toISOString().split('T')[0]);
        }
        return dates;
    }

    function processAndRenderCharts(data) {
        const dates = generateLast15Days();
        
        // 提取所有不重复的生态来源
        const sources = [...new Set(data.map(item => item.source))];
        
        // --- 准备折线图（趋势对比）数据 ---
        const datasets = sources.map(source => {
            const counts = {};
            dates.forEach(d => counts[d] = 0);
            
            // 统计该生态每天的数据量
            data.forEach(item => {
                if (item.source === source && counts[item.date] !== undefined) {
                    counts[item.date]++;
                }
            });

            const colorTheme = colors[source] || colors['Default'];
            
            return {
                label: source,
                data: dates.map(d => counts[d]),
                borderColor: colorTheme.border,
                backgroundColor: colorTheme.bg,
                borderWidth: 2,
                fill: true,
                tension: 0.4
            };
        });

        // 渲染折线图
        new Chart(document.getElementById('trendChart').getContext('2d'), {
            type: 'line',
            data: { labels: dates, datasets: datasets },
            options: { responsive: true, interaction: { mode: 'index', intersect: false }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });

        // --- 准备极面积图（生态活跃度基准）数据 ---
        const sourceTotals = sources.map(source => data.filter(item => item.source === source).length);
        const bgColors = sources.map(source => (colors[source] || colors['Default']).bg.replace('0.2', '0.6'));
        const borderColors = sources.map(source => (colors[source] || colors['Default']).border);

        // 渲染极面积图 (极具大屏观测质感)
        new Chart(document.getElementById('ecosystemChart').getContext('2d'), {
            type: 'polarArea',
            data: {
                labels: sources,
                datasets: [{
                    label: '近15天总发布量',
                    data: sourceTotals,
                    backgroundColor: bgColors,
                    borderColor: borderColors,
                    borderWidth: 1
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function renderTimeline(data) {
        const list = document.getElementById('timelineList');
        if (data.length === 0) {
            list.innerHTML = `<li style="color:#888;">暂无数据。</li>`;
            return;
        }

        list.innerHTML = data.map(item => {
            const tagColor = (colors[item.source] || colors['Default']).tag;
            return `
            <li class="timeline-item">
                <div class="timeline-meta">
                    <span class="tag" style="background-color: ${tagColor}">${item.source}</span>
                    <span>发布于：${item.date}</span>
                </div>
                <a href="${item.link}" target="_blank" class="timeline-title">${item.title}</a>
            </li>
        `}).join('');
    }

    loadData();
</script>

</body>
</html>
