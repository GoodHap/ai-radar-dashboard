<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 核心情报终端 (Pro版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --card-bg: #161b22; --text: #c9d1d9; --text-muted: #8b949e; --border: #30363d; --primary: #58a6ff; --success: #2ea043; --danger: #f85149; --warning: #d29922; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 顶部看板 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); }
        .header-title h1 { margin: 0 0 8px 0; font-size: 1.8rem; color: #fff; display: flex; align-items: center; gap: 12px; }
        .live-badge { background: rgba(248, 81, 73, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .live-dot { width: 8px; height: 8px; background-color: var(--danger); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(248, 81, 73, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); } }
        .header-meta { color: var(--text-muted); font-size: 0.9rem; }
        
        /* 数据卡片 */
        .metric-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .card-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .card-value { font-size: 1.8rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .card-trend { font-size: 0.8rem; color: var(--success); }

        /* 三栏布局 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .panel { background: var(--card-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px; color: #fff; }

        /* 排行榜表格 */
        .leaderboard { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        .leaderboard th { padding: 8px 4px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .leaderboard td { padding: 10px 4px; border-bottom: 1px solid rgba(48, 54, 61, 0.5); }
        .leaderboard tr:hover td { background-color: rgba(255,255,255,0.02); }
        .type-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: rgba(88, 166, 255, 0.1); color: var(--primary); }
        .type-badge.prop { background: rgba(210, 153, 34, 0.1); color: var(--warning); }

        /* 时间轴 */
        .timeline-container { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .timeline-item { padding: 12px 0; border-bottom: 1px dashed var(--border); }
        .timeline-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
        .timeline-title { font-size: 0.95rem; text-decoration: none; color: #fff; line-height: 1.4; }
        .timeline-title:hover { color: var(--primary); }
        
        /* 融资标签 */
        .funding-amount { font-weight: bold; color: var(--success); font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h1>AI 核心情报终端 <div class="live-badge"><div class="live-dot"></div>LIVE</div></h1>
            <div class="header-meta" id="sysTime">系统时间加载中...</div>
        </div>
    </header>

    <div class="metric-cards">
        <div class="card">
            <div class="card-title">全网追踪模型总数</div>
            <div class="card-value" id="valTotalModels">--</div>
            <div class="card-trend">Hugging Face 实时同步</div>
        </div>
        <div class="card">
            <div class="card-title">15日高频活跃发布</div>
            <div class="card-value" id="valActiveNews">--</div>
            <div class="card-trend">动态持续更新中</div>
        </div>
        <div class="card">
            <div class="card-title">全球 AI 市场规模 (预测)</div>
            <div class="card-value" id="valMarketSize">--</div>
            <div class="card-trend">基于近期融资事件</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- 面板1：模型实力天梯榜 (models.json) -->
        <div class="panel">
            <h2>🏆 全球大模型综合基准排名</h2>
            <div class="timeline-container">
                <table class="leaderboard" id="leaderboardTable">
                    <thead>
                        <tr>
                            <th>模型名称</th>
                            <th>厂商/生态</th>
                            <th>综合评分</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <tr><td colspan="3" style="color:var(--text-muted);">拉取 API 数据中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 面板2：自动捕获的融资事件 (market.json) -->
        <div class="panel">
            <h2>💰 近期资本与融资捕获 (NLP提取)</h2>
            <div class="timeline-container">
                <ul class="timeline" id="fundingList">
                    <li style="color:var(--text-muted);">正在分析最新财报数据...</li>
                </ul>
            </div>
        </div>

        <!-- 面板3：全球行业动态 (news.json) -->
        <div class="panel">
            <h2>📅 行业最新动态 (15-Day)</h2>
            <div class="timeline-container">
                <ul class="timeline" id="newsList">
                    <li style="color:var(--text-muted);">同步卫星数据中...</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    // 时钟
    setInterval(() => {
        const now = new Date();
        document.getElementById('sysTime').innerText = `系统时间：${now.toLocaleDateString('zh-CN')} ${now.toLocaleTimeString('zh-CN')} (每小时自动化节点校验)`;
    }, 1000);

    // 核心拉取逻辑：并行拉取 3 个 JSON
    async function initDashboard() {
        const timestamp = new Date().getTime();
        try {
            const [newsRes, modelsRes, marketRes] = await Promise.all([
                fetch(`news.json?t=${timestamp}`),
                fetch(`models.json?t=${timestamp}`),
                fetch(`market.json?t=${timestamp}`)
            ]);

            if (newsRes.ok) {
                const news = await newsRes.json();
                document.getElementById('valActiveNews').innerText = news.length;
                renderNews(news);
            }
            if (modelsRes.ok) {
                const models = await modelsRes.json();
                document.getElementById('valTotalModels').innerText = models.total_tracked;
                renderModels(models.leaderboard);
            }
            if (marketRes.ok) {
                const market = await marketRes.json();
                document.getElementById('valMarketSize').innerText = market.global_market_size;
                renderMarket(market.funding_events);
            }
        } catch (error) {
            console.error("首次运行请前往 GitHub Actions 手动执行一次获取数据", error);
        }
    }

    function renderModels(leaderboard) {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = leaderboard.map(m => `
            <tr>
                <td>
                    <strong>${m.name}</strong><br>
                    <span class="type-badge ${m.type === 'Proprietary' ? 'prop' : ''}">${m.type}</span>
                </td>
                <td style="color:var(--text-muted);">${m.company}</td>
                <td style="color:var(--success); font-weight:bold;">${m.score.toFixed(1)}</td>
            </tr>
        `).join('');
    }

    function renderMarket(events) {
        const list = document.getElementById('fundingList');
        if (events.length === 0) {
            list.innerHTML = `<li style="color:var(--text-muted);">近 15 天未捕捉到大额融资事件。</li>`;
            return;
        }
        list.innerHTML = events.map(e => `
            <li class="timeline-item">
                <div class="timeline-meta">${e.date} | 探测到资金异动</div>
                <div class="funding-amount">${e.amount}</div>
                <a href="${e.link}" target="_blank" class="timeline-title">${e.title}</a>
            </li>
        `).join('');
    }

    function renderNews(news) {
        const list = document.getElementById('newsList');
        list.innerHTML = news.slice(0, 15).map(item => `
            <li class="timeline-item">
                <div class="timeline-meta">${item.date} | 来源: ${item.source}</div>
                <a href="${item.link}" target="_blank" class="timeline-title">${item.title}</a>
            </li>
        `).join('');
    }

    initDashboard();
</script>
</body>
</html>
