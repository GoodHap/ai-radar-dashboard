<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 核心情报终端 (Pro版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --card-bg: #161b22; --text: #c9d1d9; --text-muted: #8b949e; --border: #30363d; --primary: #58a6ff; --success: #2ea043; --danger: #f85149; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 顶部 LIVE 看板 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); }
        .header-title h1 { margin: 0 0 8px 0; font-size: 1.8rem; color: #fff; display: flex; align-items: center; gap: 12px; }
        
        /* LIVE 动画 */
        .live-badge { background: rgba(248, 81, 73, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .live-dot { width: 8px; height: 8px; background-color: var(--danger); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(248, 81, 73, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); } }
        
        .header-meta { color: var(--text-muted); font-size: 0.9rem; }
        .header-meta span { color: var(--primary); font-weight: 600; font-variant-numeric: tabular-nums; }

        /* 宏观数据卡片 */
        .metric-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .card-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .card-value { font-size: 1.8rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .card-trend { font-size: 0.8rem; color: var(--success); }

        /* 网格布局 */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 1000px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .panel { background: var(--card-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border); }
        .panel h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px; color: #fff; }

        /* 筛选器 */
        .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; }

        /* 时间轴 */
        .timeline-container { max-height: 600px; overflow-y: auto; padding-right: 10px; }
        .timeline { list-style: none; padding: 0; margin: 0; }
        .timeline-item { padding: 16px 0; border-bottom: 1px dashed var(--border); display: flex; gap: 16px; }
        .timeline-date { min-width: 60px; font-size: 0.85rem; color: var(--text-muted); padding-top: 2px; }
        .timeline-content { flex: 1; }
        .timeline-meta { margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
        .tag { color: #fff; padding: 2px 8px; border-radius: 4px; font-weight: 500; font-size: 0.75rem; }
        .timeline-title { font-size: 1rem; font-weight: 600; text-decoration: none; color: #fff; display: block; line-height: 1.5; margin-bottom: 6px; }
        .timeline-title:hover { color: var(--primary); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h1>
                AI 核心情报终端
                <div class="live-badge"><div class="live-dot"></div>LIVE</div>
            </h1>
            <div class="header-meta">
                数据节点：<span id="sysTime">00:00:00</span> | 数据源：GitHub Actions 自动化集群
            </div>
        </div>
    </header>

    <!-- 模块1：宏观数据卡片 (静态演示版，后续接入真实数据) -->
    <div class="metric-cards">
        <div class="card">
            <div class="card-title">追踪模型总数</div>
            <div class="card-value">142</div>
            <div class="card-trend">本月新增: +6 (如 Kimi K3)</div>
        </div>
        <div class="card">
            <div class="card-title">当前最高基准分 (BenchAlign v5)</div>
            <div class="card-value">94.2</div>
            <div class="card-trend" style="color:var(--text-muted)">由 GPT-5.6 Sol 保持</div>
        </div>
        <div class="card">
            <div class="card-title">15日活跃发布数</div>
            <div class="card-value" id="activePostsCount">--</div>
            <div class="card-trend">动态持续更新中</div>
        </div>
        <div class="card">
            <div class="card-title">全球 AI 市场规模 (2026)</div>
            <div class="card-value">$412B</div>
            <div class="card-trend">预期年复合增长 37%</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- 模块2：15天动态时间轴与多维筛选 -->
        <div class="panel">
            <h2>📅 全球头部厂商动态 (近15天)</h2>
            <div class="filters" id="sourceFilters">
                <button class="filter-btn active" data-source="All">全部动态</button>
                <button class="filter-btn" data-source="Google AI">Google</button>
                <button class="filter-btn" data-source="Hugging Face">开源社区(HF)</button>
                <!-- 预留其他厂商位置 -->
                <button class="filter-btn" data-source="OpenAI">OpenAI</button>
                <button class="filter-btn" data-source="Anthropic">Anthropic</button>
            </div>
            <div class="timeline-container">
                <ul class="timeline" id="timelineList">
                    <li style="color:var(--text-muted);">正在同步卫星数据...</li>
                </ul>
            </div>
        </div>

        <!-- 占位符：模块3与模块4的图表区域 -->
        <div class="panel">
            <h2>📈 模型趋势与宏观指标 (建设中)</h2>
            <canvas id="trendChart" height="300"></canvas>
            <p style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">
                即将接入: BrowseComp / SWE-bench 趋势图
            </p>
        </div>
    </div>
</div>

<script>
    let globalData = [];
    const colors = {
        'Google AI': '#4285F4', 'Hugging Face': '#FFD21E', 'AWS Machine Learning': '#FF9900',
        'OpenAI': '#10a37f', 'Anthropic': '#d97757', 'Default': '#666666'
    };

    function updateClock() {
        const now = new Date();
        document.getElementById('sysTime').innerText = now.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' ' + now.toLocaleTimeString('zh-CN', { hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();

    async function loadData() {
        try {
            const response = await fetch(`data.json?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error('Data file not ready.');
            globalData = await response.json();
            
            document.getElementById('activePostsCount').innerText = globalData.length;
            renderTimeline('All');
            setupFilters();
            renderPlaceholderChart();
        } catch (error) {
            document.getElementById('timelineList').innerHTML = `<li style="color:var(--danger);">数据链接失败：${error.message}</li>`;
        }
    }

    function renderTimeline(filterSource) {
        const list = document.getElementById('timelineList');
        const filteredData = filterSource === 'All' ? globalData : globalData.filter(i => i.source === filterSource);
        
        if (filteredData.length === 0) {
            list.innerHTML = `<li style="color:var(--text-muted);">该维度下暂无动态。</li>`;
            return;
        }

        list.innerHTML = filteredData.map(item => {
            const tagColor = colors[item.source] || colors['Default'];
            // 提取月日用于时间轴展示
            const shortDate = item.date.split('-').slice(1).join('/'); 
            return `
            <li class="timeline-item">
                <div class="timeline-date">${shortDate}</div>
                <div class="timeline-content">
                    <div class="timeline-meta">
                        <span class="tag" style="background-color: ${tagColor}">${item.source}</span>
                        ${item.title.includes('Release') || item.title.includes('Model') ? '<span class="tag" style="background-color: #238636;">产品发布</span>' : ''}
                    </div>
                    <a href="${item.link}" target="_blank" class="timeline-title">${item.title}</a>
                </div>
            </li>
        `}).join('');
    }

    function setupFilters() {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                buttons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderTimeline(e.target.dataset.source);
            });
        });
    }

    function renderPlaceholderChart() {
        // 使用图表库画一个未来风格的趋势图，占位等待后端数据
        const ctx = document.getElementById('trendChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['15天前', '12天前', '9天前', '6天前', '3天前', '今天'],
                datasets: [
                    { label: 'GPT-5.6 Sol (模拟)', data: [91, 91.5, 92.1, 93.0, 94.2, 94.2], borderColor: '#10a37f', tension: 0.4 },
                    { label: 'Claude Mythos 5 (模拟)', data: [89, 90.2, 91.0, 91.8, 92.5, 93.1], borderColor: '#d97757', tension: 0.4 }
                ]
            },
            options: { responsive: true, scales: { y: { grid: { color: '#30363d' } }, x: { grid: { color: '#30363d' } } }, color: '#8b949e' }
        });
    }

    loadData();
</script>
</body>
</html>
